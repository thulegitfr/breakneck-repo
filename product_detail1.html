<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Fur Hoodie - breakneck</title>
  <link href="main.css" rel="stylesheet">
</head>

<body>

<header class="header-small">
  <div class="header-top">
    <nav class="nav-left">
      <a href="home.html">Home</a>
      <a href="aboutus.html">About Us</a>
      <a href="#">News</a>
      <a href="#">Shop By</a>
    </nav>

    <img src="images/logo.png" alt="breakneck" class="header-logo">

    <nav class="nav-right">
      <a href="signin.html">My Account</a>
      <a href="checkout.html">My Cart</a>
    </nav>
  </div>


</header>

<section class="product-detail">

  <div class="product-image">
    <img src="images/furhoodie.webp" alt="Fur Hoodie">
  </div>

  <div class="product-info">
    <h1>The Furrey </h1>
    <p class="price">$29.99</p>
    <p>Stylish fur-lined hoodie with a fitted silhouette. Inspired by early 2000s street culture. Comfortable and bold, made for everyday wear.</p>
    <p>Material: 320gsm cotton blend. Machine washable.</p>
    <a href="checkout.html" class="button-main">Proceed to Checkout</a>
  </div>

</section>
<section class = "feedback-section">
   <h2>Leave a Review</h2>

  <form class="feedback-form">

    <label for="review-name">Name</label>
    <input type="text" id="review-name" placeholder="Enter your name" required>

    <label for="review-email">Email</label>
    <input type="email" id="review-email" placeholder="Enter your email" required>

    <label>Rating</label>
    <div class="star-rating">
      <input type="radio" id="star5" name="rating" value="5">
      <label for="star5">★★★★★</label>
      <input type="radio" id="star4" name="rating" value="4">
      <label for="star4">★★★★</label>
      <input type="radio" id="star3" name="rating" value="3">
      <label for="star3">★★★</label>
      <input type="radio" id="star2" name="rating" value="2">
      <label for="star2">★★</label>
      <input type="radio" id="star1" name="rating" value="1">
      <label for="star1">★</label>
    </div>

    <label for="review-comment">Review</label>
    <textarea id="review-comment" placeholder="Write your review here..." rows="4" required></textarea>

    <button type="submit" class="button-main">Submit Review</button>

  </form>
</section>
</body>
</html>
